name: Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**']
  pull_request:
    branches: [main]
    paths: ['infra/**']

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-southeast-1

jobs:
  # ── Lint (runs once) ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"
      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive

  # ── Check which environments exist ──
  check-envs:
    runs-on: ubuntu-latest
    outputs:
      has_dev: ${{ steps.check.outputs.has_dev }}
      has_prod: ${{ steps.check.outputs.has_prod }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          [ -f infra/envs/dev.tfvars ] && echo "has_dev=true" >> "$GITHUB_OUTPUT" || echo "has_dev=false" >> "$GITHUB_OUTPUT"
          [ -f infra/envs/prod.tfvars ] && echo "has_prod=true" >> "$GITHUB_OUTPUT" || echo "has_prod=false" >> "$GITHUB_OUTPUT"

  # ── Plan Dev ──
  plan-dev:
    needs: [lint, check-envs]
    if: needs.check-envs.outputs.has_dev == 'true'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend-config="key=dev/terraform.tfstate"

      - name: Terraform plan
        id: plan
        working-directory: infra
        run: |
          set +e
          terraform plan -var-file=envs/dev.tfvars -no-color -out=tfplan 2>&1 | tee plan_output.txt
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -ne 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Plan failed with exit code $PLAN_EXIT"
            exit 1
          elif grep -q "No changes" plan_output.txt; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan (dev)\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/tfplan

  # ── Plan Prod ──
  plan-prod:
    needs: [lint, check-envs]
    if: needs.check-envs.outputs.has_prod == 'true'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_PROD_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend-config="key=prod/terraform.tfstate"

      - name: Terraform plan
        id: plan
        working-directory: infra
        run: |
          terraform plan -var-file=envs/prod.tfvars -no-color -out=tfplan 2>&1 | tee plan_output.txt
          if grep -q "No changes" plan_output.txt; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan (prod)\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/tfplan

  # ── Apply Dev (auto after plan, gated by dev environment) ──
  apply-dev:
    needs: plan-dev
    if: github.ref == 'refs/heads/main' && needs.plan-dev.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Keycloak realm exports to S3
        working-directory: infra
        run: |
          BUCKET="${{ vars.ARTIFACTS_BUCKET }}"
          if [ -f exports/realm-export.json ]; then
            aws s3 cp exports/realm-export.json "s3://${BUCKET}/keycloak/realm-export.json"
            echo "Realm export uploaded"
          fi
          if [ -f exports/realm-export-dev-users.json ]; then
            aws s3 cp exports/realm-export-dev-users.json "s3://${BUCKET}/keycloak/realm-export-dev-users.json"
            echo "Dev users export uploaded"
          fi

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend-config="key=dev/terraform.tfstate"

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

  # ── Apply Prod (requires dev to succeed + manual approval) ──
  apply-prod:
    needs: [plan-prod, apply-dev]
    if: github.ref == 'refs/heads/main' && needs.plan-prod.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_PROD_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Keycloak realm exports to S3
        working-directory: infra
        run: |
          BUCKET="${{ vars.ARTIFACTS_BUCKET }}"
          if [ -f exports/realm-export.json ]; then
            aws s3 cp exports/realm-export.json "s3://${BUCKET}/keycloak/realm-export.json"
            echo "Realm export uploaded"
          fi

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend-config="key=prod/terraform.tfstate"

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
